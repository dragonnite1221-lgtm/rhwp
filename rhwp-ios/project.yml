name: AlHangeul
options:
  bundleIdPrefix: com.edwardkim
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

targets:
  AlHangeul:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    resources:
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edwardkim.alhangeul
        PRODUCT_NAME: 알한글
        INFOPLIST_FILE: Sources/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/rhwp-Bridging-Header.h
        OTHER_LDFLAGS:
          - "-lrhwp"
          - "-framework Security"
          - "-framework CoreFoundation"
        DEVELOPMENT_TEAM: "FSFG3AQ4KZ"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        CODE_SIGN_STYLE: "Automatic"
      configs:
        Debug:
          "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios-sim/release"
          "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios/release"
        Release:
          "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios-sim/release"
          "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios/release"
